specVersion: 0.0.4
description: BookManagerSubGraph
repository: https://github.com/scaffold-eth/se-2/packages/subgraph/
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum/contract
    name: BookDeployer
    network: localhost
    source:
      abi: BookDeployer
      address: "0xB7f8BC63BbcaD18155201308C8f3540b07f84F5e"
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Deployer
      abis:
        - name: BookDeployer
          file: BookDeployer\abis\localhost_BookDeployer.json
      eventHandlers:
        - event: Deployer(indexed address,indexed address,indexed address)
          handler: handleDeployer
      file: BookDeployer\BookDeployer.wasm
templates:
  - kind: ethereum/contract
    name: BookManager
    network: localhost
    source:
      abi: BookManager
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Verse
        - Confirmation
        - Donation
        - Book
      abis:
        - name: BookManager
          file: BookManager\abis\localhost_BookManager.json
      eventHandlers:
        - event: Verse(indexed address,bytes,uint256,uint256,uint256,string)
          handler: handleVerse
        - event: Confirmation(address,bytes)
          handler: handleConfirmation
        - event: Donation(address,uint256)
          handler: handleDonation
        - event: Book(indexed address,string,uint256)
          handler: handleBook
      file: templates\BookManager\BookManager.wasm
